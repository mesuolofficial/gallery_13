<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aether Gallery | Clean, Cinematic, Easy to Use</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e1a;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Particle canvas (subtle background) */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e0ff, #ffb3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p {
            color: #8e9aaf;
            margin-top: 0.5rem;
        }

        /* Masonry grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        /* Card */
        .album-card {
            background: rgba(20, 28, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .album-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
            border-color: rgba(0, 255, 255, 0.4);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 0.85;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .album-card:hover .card-img {
            transform: scale(1.02);
        }
        .card-info {
            padding: 1.2rem;
        }
        .card-info h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .card-info p {
            font-size: 0.85rem;
            color: #b0bedd;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #8e9aaf;
        }
        .photo-badge {
            background: rgba(0, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 40px;
        }

        /* Lightbox (full-screen, swipeable) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        .lightbox-content {
            max-width: 85vw;
            max-height: 85vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .lightbox-caption {
            position: absolute;
            bottom: -40px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 0.9rem;
        }
        .close-lb {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            z-index: 1001;
        }
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 60px;
            transition: 0.2s;
        }
        .lb-nav:hover {
            background: rgba(0,0,0,0.8);
        }
        .lb-prev { left: 20px; }
        .lb-next { right: 20px; }
        @media (max-width: 640px) {
            .lb-nav { font-size: 1.2rem; padding: 0.3rem 0.8rem; }
            .lb-prev { left: 10px; }
            .lb-next { right: 10px; }
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #5f6c84;
        }

        /* Scroll reveal animation */
        .album-card {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .album-card.revealed {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-spa"></i> Aether Gallery</h1>
        <p>Clean • Cinematic • Click any album to explore</p>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
    <footer>✨ Hover to lift • Click for full-screen lightbox • Swipe to browse</footer>
</div>

<div id="lightbox" class="lightbox">
    <button class="close-lb" id="closeLbBtn">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev"><i class="fas fa-chevron-left"></i></button>
    <button class="lb-nav lb-next" id="lbNext"><i class="fas fa-chevron-right"></i></button>
    <div class="lightbox-content">
        <img id="lbImage" src="" alt="">
        <div class="lightbox-caption" id="lbCaption"></div>
    </div>
</div>

<script>
    // Album data (each with cover + gallery)
    const albums = [
        { id:0, title:"Neon Dreams", desc:"Electric nights and retro-future vibes.", photos:42, cover:"https://picsum.photos/id/0/600/500", gallery:["https://picsum.photos/id/0/1200/800","https://picsum.photos/id/1/1200/800","https://picsum.photos/id/2/1200/800"] },
        { id:1, title:"Mystic Peaks", desc:"Foggy mountains and eternal silence.", photos:38, cover:"https://picsum.photos/id/104/600/500", gallery:["https://picsum.photos/id/104/1200/800","https://picsum.photos/id/105/1200/800","https://picsum.photos/id/106/1200/800"] },
        { id:2, title:"Retro Waves", desc:"Synthwave aesthetics and vintage cars.", photos:27, cover:"https://picsum.photos/id/111/600/500", gallery:["https://picsum.photos/id/111/1200/800","https://picsum.photos/id/112/1200/800","https://picsum.photos/id/113/1200/800"] },
        { id:3, title:"Ocean Abyss", desc:"Bioluminescence and deep sea secrets.", photos:53, cover:"https://picsum.photos/id/15/600/500", gallery:["https://picsum.photos/id/15/1200/800","https://picsum.photos/id/16/1200/800","https://picsum.photos/id/17/1200/800"] },
        { id:4, title:"Urban Mirage", desc:"Skyscrapers and neon haze.", photos:34, cover:"https://picsum.photos/id/20/600/500", gallery:["https://picsum.photos/id/20/1200/800","https://picsum.photos/id/21/1200/800","https://picsum.photos/id/22/1200/800"] },
        { id:5, title:"Golden Eclipse", desc:"Solar flares and twilight magic.", photos:29, cover:"https://picsum.photos/id/10/600/500", gallery:["https://picsum.photos/id/10/1200/800","https://picsum.photos/id/11/1200/800","https://picsum.photos/id/12/1200/800"] },
        { id:6, title:"Silent Woods", desc:"Ancient trees and dappled light.", photos:33, cover:"https://picsum.photos/id/96/600/500", gallery:["https://picsum.photos/id/96/1200/800","https://picsum.photos/id/97/1200/800","https://picsum.photos/id/98/1200/800"] }
    ];

    const grid = document.getElementById('galleryGrid');
    let currentLightboxAlbum = null;
    let currentPhotoIndex = 0;

    // Build grid
    function buildGrid() {
        grid.innerHTML = '';
        albums.forEach((album, idx) => {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.setAttribute('data-idx', idx);
            card.innerHTML = `
                <img class="card-img" src="${album.cover}" alt="${album.title}" loading="lazy">
                <div class="card-info">
                    <h3>${escapeHtml(album.title)}</h3>
                    <p>${escapeHtml(album.desc)}</p>
                    <div class="meta">
                        <span class="photo-badge"><i class="fas fa-camera"></i> ${album.photos}</span>
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openLightbox(album));
            grid.appendChild(card);
        });
    }

    // Lightbox logic
    const lightbox = document.getElementById('lightbox');
    const lbImage = document.getElementById('lbImage');
    const lbCaption = document.getElementById('lbCaption');
    const closeLb = document.getElementById('closeLbBtn');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');

    function openLightbox(album) {
        currentLightboxAlbum = album;
        currentPhotoIndex = 0;
        updateLightboxImage();
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function updateLightboxImage() {
        lbImage.src = currentLightboxAlbum.gallery[currentPhotoIndex];
        lbCaption.innerText = `${currentLightboxAlbum.title} – ${currentPhotoIndex+1} / ${currentLightboxAlbum.gallery.length}`;
    }
    function nextPhoto() {
        currentPhotoIndex = (currentPhotoIndex + 1) % currentLightboxAlbum.gallery.length;
        updateLightboxImage();
    }
    function prevPhoto() {
        currentPhotoIndex = (currentPhotoIndex - 1 + currentLightboxAlbum.gallery.length) % currentLightboxAlbum.gallery.length;
        updateLightboxImage();
    }
    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        currentLightboxAlbum = null;
    }
    closeLb.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', prevPhoto);
    lbNext.addEventListener('click', nextPhoto);
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });
    // keyboard navigation
    window.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') prevPhoto();
        if (e.key === 'ArrowRight') nextPhoto();
        if (e.key === 'Escape') closeLightbox();
    });

    // ---- Particle background (subtle) ----
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.2;
            this.speedY = (Math.random() - 0.5) * 0.2;
            this.color = `rgba(100, 180, 255, ${Math.random() * 0.3 + 0.1})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
            // mouse repulsion
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                const force = (100 - dist) / 100 * 0.3;
                this.x -= Math.cos(angle) * force;
                this.y -= Math.sin(angle) * force;
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
    function initParticles() {
        particles = [];
        for (let i = 0; i < 120; i++) particles.push(new Particle());
    }
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('touchmove', (e) => { if (e.touches.length) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; } });
    resizeCanvas();
    initParticles();
    animateParticles();

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('revealed'); });
    }, { threshold: 0.1 });
    function observeCards() {
        document.querySelectorAll('.album-card').forEach(card => observer.observe(card));
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    buildGrid();
    observeCards();
</script>
</body>
</html>
