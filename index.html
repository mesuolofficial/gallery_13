<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Hand of Cards | True Fan Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 30% 20%, #1a2a3a, #0a0f1a);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gallery-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            position: relative;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #aab5c4;
            font-size: 0.9rem;
        }
        /* Hand area */
        .hand {
            position: relative;
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 800px;
            perspective-origin: 50% 100%;
        }
        .card-fan {
            position: relative;
            width: 280px;
            height: 360px;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        /* Individual card */
        .fan-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(20, 28, 45, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
            transform-origin: bottom center;
        }
        /* Each card's rotation and translation (set by JS) */
        .fan-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-info {
            padding: 1rem;
            color: white;
        }
        .card-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
        }
        .card-info p {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .photo-count {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            background: rgba(0,255,255,0.2);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 30px;
        }
        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .ctrl-btn:active {
            transform: scale(0.95);
        }
        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        .lightbox-content {
            max-width: 85vw;
            text-align: center;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 24px;
        }
        .close-lb {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .hand { height: 350px; }
            .card-fan { width: 220px; height: 290px; }
            .fan-card img { height: 150px; }
            .card-info h3 { font-size: 1rem; }
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #7a879a;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="gallery-container">
    <div class="header">
        <h1><i class="fas fa-hand-peace"></i> Hand of Cards</h1>
        <p>Realistic fan • Swipe to rotate • Click any card → it becomes the front</p>
    </div>
    <div class="hand" id="handArea">
        <div class="card-fan" id="cardFan"></div>
    </div>
    <div class="controls">
        <button class="ctrl-btn" id="prevHandBtn"><i class="fas fa-chevron-left"></i> Prev</button>
        <button class="ctrl-btn" id="nextHandBtn">Next <i class="fas fa-chevron-right"></i></button>
    </div>
    <footer>✨ Cards are angled like a real hand • Swipe left/right to rotate the fan</footer>
</div>

<div id="lightbox" class="lightbox">
    <button class="close-lb" id="closeLb">&times;</button>
    <div class="lightbox-content">
        <img id="lbImage" src="" alt="">
        <p id="lbCaption" style="color:white; margin-top:0.5rem;"></p>
    </div>
</div>

<script>
    // Album data
    const albums = [
        { id:0, title:"Neon Dreams", desc:"Electric nights, retro-future vibes.", photos:42, cover:"https://picsum.photos/id/0/400/500", gallery:["https://picsum.photos/id/0/1000/700","https://picsum.photos/id/1/1000/700"] },
        { id:1, title:"Mystic Peaks", desc:"Foggy mountains and eternal silence.", photos:38, cover:"https://picsum.photos/id/104/400/500", gallery:["https://picsum.photos/id/104/1000/700","https://picsum.photos/id/105/1000/700"] },
        { id:2, title:"Retro Waves", desc:"Synthwave aesthetics, vintage cars.", photos:27, cover:"https://picsum.photos/id/111/400/500", gallery:["https://picsum.photos/id/111/1000/700","https://picsum.photos/id/112/1000/700"] },
        { id:3, title:"Ocean Abyss", desc:"Bioluminescence and deep secrets.", photos:53, cover:"https://picsum.photos/id/15/400/500", gallery:["https://picsum.photos/id/15/1000/700","https://picsum.photos/id/16/1000/700"] },
        { id:4, title:"Urban Mirage", desc:"Skyscrapers and neon haze.", photos:34, cover:"https://picsum.photos/id/20/400/500", gallery:["https://picsum.photos/id/20/1000/700","https://picsum.photos/id/21/1000/700"] },
        { id:5, title:"Golden Eclipse", desc:"Solar flares and twilight magic.", photos:29, cover:"https://picsum.photos/id/10/400/500", gallery:["https://picsum.photos/id/10/1000/700","https://picsum.photos/id/11/1000/700"] },
        { id:6, title:"Silent Woods", desc:"Ancient trees and dappled light.", photos:33, cover:"https://picsum.photos/id/96/400/500", gallery:["https://picsum.photos/id/96/1000/700","https://picsum.photos/id/97/1000/700"] }
    ];

    let currentCenterIndex = 3; // start with album at index 3 in center
    const totalCards = albums.length;
    const fanAngle = 35;   // total spread angle (degrees)
    const maxOffset = 45;   // horizontal translation for outer cards (px)
    
    const fanContainer = document.getElementById('cardFan');
    let cardsElements = [];

    function buildFan() {
        fanContainer.innerHTML = '';
        cardsElements = [];
        for (let i = 0; i < totalCards; i++) {
            const card = document.createElement('div');
            card.className = 'fan-card';
            const album = albums[i];
            card.innerHTML = `
                <img src="${album.cover}" alt="${album.title}" loading="lazy">
                <div class="card-info">
                    <h3>${escapeHtml(album.title)}</h3>
                    <p>${escapeHtml(album.desc.substring(0, 60))}…</p>
                    <div class="photo-count"><i class="fas fa-camera"></i> ${album.photos}</div>
                </div>
            `;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                // bring this card to the center
                const newCenter = i;
                rotateFanToCenter(newCenter);
            });
            fanContainer.appendChild(card);
            cardsElements.push(card);
        }
        updateFanPositions();
    }

    function updateFanPositions() {
        const centerIdx = currentCenterIndex;
        const half = totalCards / 2;
        for (let i = 0; i < totalCards; i++) {
            const offset = i - centerIdx;
            // angle: max ±fanAngle/2 at extremes, 0 at center
            let angle = (offset / half) * (fanAngle / 2);
            angle = Math.min(fanAngle/2, Math.max(-fanAngle/2, angle));
            // horizontal translation: outer cards shift left/right
            let translateX = (offset / half) * maxOffset;
            // also slight vertical drop for realism
            let translateY = Math.abs(offset) * 2;
            // z-index: higher for center, lower for edges
            const zIndex = 100 - Math.abs(offset);
            // rotateY for perspective? but we use rotateZ for fan
            const transform = `rotate(${angle}deg) translateX(${translateX}px) translateY(${translateY}px)`;
            cardsElements[i].style.transform = transform;
            cardsElements[i].style.zIndex = zIndex;
            // also adjust opacity/blur for depth
            const opacity = 1 - Math.abs(offset) * 0.12;
            cardsElements[i].style.opacity = Math.max(0.4, opacity);
            cardsElements[i].style.filter = `brightness(${1 - Math.abs(offset)*0.1})`;
        }
    }

    function rotateFanToCenter(newCenterIdx) {
        if (newCenterIdx < 0) newCenterIdx = 0;
        if (newCenterIdx >= totalCards) newCenterIdx = totalCards - 1;
        currentCenterIndex = newCenterIdx;
        updateFanPositions();
    }

    function nextCard() {
        rotateFanToCenter(currentCenterIndex + 1);
    }
    function prevCard() {
        rotateFanToCenter(currentCenterIndex - 1);
    }

    // Swipe support on hand area
    let touchStartX = 0;
    let touchEndX = 0;
    const handArea = document.getElementById('handArea');
    handArea.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    handArea.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const diff = touchEndX - touchStartX;
        if (Math.abs(diff) > 40) {
            if (diff > 0) prevCard();
            else nextCard();
        }
    });
    // Mouse drag (desktop) - simple left/right
    let mouseDownX = 0;
    let isDragging = false;
    handArea.addEventListener('mousedown', (e) => {
        isDragging = true;
        mouseDownX = e.clientX;
        e.preventDefault();
    });
    window.addEventListener('mouseup', () => {
        if (isDragging) isDragging = false;
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const diff = e.clientX - mouseDownX;
        if (Math.abs(diff) > 50) {
            if (diff > 0) prevCard();
            else nextCard();
            isDragging = false;
        }
    });

    // Buttons
    document.getElementById('prevHandBtn').addEventListener('click', prevCard);
    document.getElementById('nextHandBtn').addEventListener('click', nextCard);

    // Lightbox: open when clicking the center card (or any card – but we open album of clicked)
    // Actually each card click already calls rotateFanToCenter. We want double click? Better: on click, after rotate, if clicked again? 
    // Simpler: long press or separate "view" button? But user said "click on any card to bring to front". Then to open lightbox, they can click the front card again.
    // We'll implement: if you click a card that is already at center, open lightbox.
    // Modify click handler: if the clicked card index equals currentCenterIndex, open lightbox.
    // We need to store the card's album data. We'll attach event with album object.
    function rebuildWithClickLogic() {
        fanContainer.innerHTML = '';
        cardsElements = [];
        for (let i = 0; i < totalCards; i++) {
            const card = document.createElement('div');
            card.className = 'fan-card';
            const album = albums[i];
            card.innerHTML = `
                <img src="${album.cover}" alt="${album.title}" loading="lazy">
                <div class="card-info">
                    <h3>${escapeHtml(album.title)}</h3>
                    <p>${escapeHtml(album.desc.substring(0, 60))}…</p>
                    <div class="photo-count"><i class="fas fa-camera"></i> ${album.photos}</div>
                </div>
            `;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (i === currentCenterIndex) {
                    openLightbox(album);
                } else {
                    rotateFanToCenter(i);
                }
            });
            fanContainer.appendChild(card);
            cardsElements.push(card);
        }
        updateFanPositions();
    }

    // Lightbox functions
    const lightbox = document.getElementById('lightbox');
    const lbImage = document.getElementById('lbImage');
    const lbCaption = document.getElementById('lbCaption');
    const closeLb = document.getElementById('closeLb');
    function openLightbox(album) {
        lbImage.src = album.gallery[0];
        lbCaption.innerText = `${album.title} • ${album.photos} memories`;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }
    closeLb.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    rebuildWithClickLogic();
</script>
</body>
</html>
